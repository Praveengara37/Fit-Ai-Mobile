### Local Storage

**Offline support strategy:**

1. **Save locally first** (fast, always works)
2. **Sync to backend** (when online)
3. **Queue failed syncs** (retry later)
4. **Show sync status** ("Syncing..." indicator)

**Storage Keys:**
```typescript
'recent_foods'      // Last 10 foods logged
'meal_sync_queue'   // Meals waiting to sync
'today_meals'       // Cache of today's meals
```

