## OFFLINE SUPPORT

### Strategy

**When Online:**
1. User logs meal
2. Save to backend immediately
3. Save to local cache
4. Update UI

**When Offline:**
1. User logs meal
2. Save to local storage
3. Add to sync queue
4. Update UI with "pending sync" indicator
5. Show offline banner

**When Back Online:**
1. Detect network connection
2. Process sync queue
3. Upload pending meals
4. Update UI (remove indicators)
5. Refresh from backend

**Implementation:**
```typescript
// Network status hook
import NetInfo from '@react-native-community/netinfo';

export function useNetworkStatus() {
  const [isOnline, setIsOnline] = useState(true);

  useEffect(() => {
    const unsubscribe = NetInfo.addEventListener(state => {
      setIsOnline(state.isConnected);
      
      if (state.isConnected) {
        // Back online - process sync queue
        processSyncQueue();
      }
    });

    return unsubscribe;
  }, []);

  return isOnline;
}
```

