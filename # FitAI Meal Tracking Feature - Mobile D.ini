export default function LogMealScreen() {
  const [mealType, setMealType] = useState('breakfast');
  const [query, setQuery] = useState('');
  const [results, setResults] = useState<Food[]>([]);
  const [addedFoods, setAddedFoods] = useState<MealFood[]>([]);
  const [recentFoods, setRecentFoods] = useState<Food[]>([]);
  const [loading, setLoading] = useState(false);
  const router = useRouter();

  useEffect(() => {
    loadRecentFoods();
  }, []);

  const searchFoods = useDebouncedCallback(async (searchQuery: string) => {
    if (searchQuery.length < 2) return;
    
    setLoading(true);
    try {
      const data = await searchFoodsAPI(searchQuery);
      setResults(data.foods);
    } catch (error) {
      Alert.alert('Error', 'Failed to search foods');
    } finally {
      setLoading(false);
    }
  }, 300);

  const handleAddFood = (food: Food) => {
    // Open serving size modal
    showServingSizeModal(food, (serving) => {
      const mealFood: MealFood = {
        ...food,
        servingSize: serving,
        calories: (food.calories / food.servingSize) * serving,
        protein: (food.protein / food.servingSize) * serving,
        // ... calculate other macros
      };
      setAddedFoods([...addedFoods, mealFood]);
    });
  };

  const handleSaveMeal = async () => {
    try {
      setLoading(true);
      await logMeal({
        mealType,
        date: new Date().toISOString().split('T')[0],
        foods: addedFoods,
      });
      
      Haptics.notificationAsync(Haptics.NotificationFeedbackType.Success);
      
      // Save to recent foods
      await saveRecentFoods(addedFoods);
      
      router.back();
    } catch (error) {
      Alert.alert('Error', 'Failed to save meal');
    } finally {
      setLoading(false);
    }
  };

  return (
    <SafeAreaView style={styles.container}>
      <KeyboardAvoidingView behavior="padding" style={{ flex: 1 }}>
        <ScrollView>
          <MealTypeSelector value={mealType} onChange={setMealType} />
          
          <SearchInput 
            value={query}
            onChangeText={(text) => {
              setQuery(text);
              searchFoods(text);
            }}
          />
          
          {recentFoods.length > 0 && (
            <RecentFoodsSection 
              foods={recentFoods}
              onQuickAdd={handleAddFood}
            />
          )}
          
          {loading && <LoadingSpinner />}
          
          {results.map(food => (
            <FoodResult 
              key={food.foodId}
              food={food}
              onAdd={() => handleAddFood(food)}
            />
          ))}
          
          {addedFoods.length > 0 && (
            <AddedFoodsSection 
              foods={addedFoods}
              onRemove={(index) => {
                setAddedFoods(addedFoods.filter((_, i) => i !== index));
              }}
              onEdit={(index) => {
                // Open edit modal
              }}
            />
          )}
        </ScrollView>
        
        <View style={styles.footer}>
          <Text style={styles.total}>
            Total: {calculateTotal(addedFoods)} calories
          </Text>
          <Button 
            title="Save Meal"
            onPress={handleSaveMeal}
            disabled={addedFoods.length === 0}
            loading={loading}
          />
        </View>
      </KeyboardAvoidingView>
    </SafeAreaView>
  );
}
```

