export default function Dashboard() {
  const [todayMeals, setTodayMeals] = useState<DailyMeals | null>(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetchTodayMeals();
  }, []);

  const fetchTodayMeals = async () => {
    try {
      const data = await getTodayMeals();
      setTodayMeals(data);
    } catch (error) {
      console.error('Failed to fetch meals');
    } finally {
      setLoading(false);
    }
  };

  if (loading) return <LoadingSkeleton />;

  return (
    <ScrollView>
      {/* Step counter (existing) */}
      <StepCounter />
      
      {/* Nutrition widget (new) */}
      <NutritionWidget 
        totals={todayMeals?.totals} 
        goals={todayMeals?.goals}
      />
    </ScrollView>
  );
}
```

