## DATA MANAGEMENT

### API Functions

**Create:** `lib/meals.ts`

```typescript
import api from './api';
import AsyncStorage from '@react-native-async-storage/async-storage';

export async function searchFoods(query: string, maxResults = 10) {
  const response = await api.get('/api/foods/search', {
    params: { query, maxResults }
  });
  return response.data.data;
}

export async function getTodayMeals() {
  const response = await api.get('/api/meals/today');
  return response.data.data;
}

export async function logMeal(data: LogMealData) {
  // Save locally first (offline support)
  await saveMealLocally(data);
  
  // Try to sync to backend
  try {
    const response = await api.post('/api/meals/log', data);
    return response.data.data;
  } catch (error) {
    // Queue for later sync
    await queueMealSync(data);
    throw error;
  }
}

export async function deleteMeal(mealId: string) {
  await api.delete(`/api/meals/${mealId}`);
}

// Recent foods management
export async function saveRecentFoods(foods: MealFood[]) {
  const recent = await getRecentFoods();
  const updated = [...foods, ...recent].slice(0, 10); // Keep last 10
  await AsyncStorage.setItem('recent_foods', JSON.stringify(updated));
}

export async function getRecentFoods(): Promise<Food[]> {
  const data = await AsyncStorage.getItem('recent_foods');
  return data ? JSON.parse(data) : [];
}

// Offline sync queue
async function queueMealSync(meal: LogMealData) {
  const queue = await AsyncStorage.getItem('meal_sync_queue');
  const meals = queue ? JSON.parse(queue) : [];
  meals.push(meal);
  await AsyncStorage.setItem('meal_sync_queue', JSON.stringify(meals));
}

export async function processSyncQueue() {
  const queue = await AsyncStorage.getItem('meal_sync_queue');
  if (!queue) return;
  
  const meals = JSON.parse(queue);
  const failed = [];
  
  for (const meal of meals) {
    try {
      await api.post('/api/meals/log', meal);
    } catch (error) {
      failed.push(meal);
    }
  }
  
  await AsyncStorage.setItem('meal_sync_queue', JSON.stringify(failed));
}
```

